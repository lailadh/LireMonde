<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LireMonde</title>
  <link href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
  <body>
    <!--header-->
    <header class="header">
      <div class="logo-section">
        <div class="logo-img">
          <img src="image/téléchargement__3_-removebg-preview.png" alt="logo" />
        </div>
        <span class="logo-titre">Lire Monde</span>
      </div>
      <ul class="header-lien">
        <li><a href="index.html" class="active">Accueil</a></li>
        <li><a href="alire.html">À lire</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
      <input
        type="text"
        class="search-bar"
        id="search-bar"
        placeholder="Rechercher un livre..."
      />
    </header>

    <section class="hero">
      <div class="hero-left">
        <h2>Découvrez votre prochaine lecture</h2>
        <p>Explorez notre collection...</p>
        <button class="btn-hero">Loud&amp;Discover</button>
      </div>
      <div class="hero-right">
        <img src="image/brain (1).png" alt="hero" />
      </div>
    </section>

    <section class="filtres-section">
      <button class="btn-filtrer" id="btn-filtrer"> Tous Les Genre </button>
      <div class="filtres-dropdown" id="filtres-dropdown">
        <button class="filtre-option active" data-genre="Tous">Tous</button>
        <button class="filtre-option" data-genre="Classique">Classique</button>
        <button class="filtre-option" data-genre="Science-fiction">
          Science-fiction
        </button>
        <button class="filtre-option" data-genre="Fantasy">Fantasy</button>
        <button class="filtre-option" data-genre="Drame">Drame</button>
      </div>
    </section>

    <!--  GRILLE LIVRES -->
    <section class="livres-section">
      <div class="livres-grid" id="livres-container">
        <!-- Les livres seront injectés ici par JS -->
      </div>
    </section>

    <!-- SECTION À LIRE  -->
    <section class="alire-section">
      <div class="alire-titre">
        <img
          src="image/crlivre-removebg-preview.png"
          alt="coeur"
          class="coeur-deco"
        />
        <h2>ALire</h2>
      </div>

      <!--blast favorie-->
      <div class="livres-grid" id="alire-container">
        <!-- Les livres "À lire" seront injectés ici par JS -->
      </div>
    </section>

    <!--  MODALE DÉTAILS  -->
    <div class="modale-overlay" id="modale-overlay">
      <div class="modale">
        <button class="modale-close" id="modale-close">&times;</button>
        <div class="modale-content">
          <img id="modale-img" src="" alt="" />
          <div class="modale-info">
            <h3 id="modale-titre"></h3>
            <p id="modale-auteur"></p>
            <span id="modale-genre" class="genre-badge"></span>
            <p id="modale-description"></p>
            <button class="btn-modale-alire" id="btn-modale-alire">
              ♡ Ajouter à ma liste
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
      <p>© 2026 LireMonde - ReadSphere Startup</p>
    </footer>

    <script src="api.js"></script>
    <script src="accueil.js"></script>
  </body>
</html>
