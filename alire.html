<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>À Lire — LireMonde</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="logo-section">
        <div class="logo-img">
          <img src="image/téléchargement__3_-removebg-preview.png" alt="logo" />
        </div>
        <span class="logo-titre">Lire Monde</span>
      </div>
      <ul class="header-lien">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="alire.html" class="active">À lire</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
      <input
        type="text"
        class="search-bar"
        id="search-bar"
        placeholder="Rechercher un livre..."
      />
    </header>

    <!-- HERO -->
    <section class="hero" style="min-height: 120px; padding: 30px 50px">
      <div class="hero-left">
        <h2>Ma liste "À lire"</h2>
        <p>Les livres que vous souhaitez lire prochainement</p>
      </div>
      <div class="hero-right">
        <img src="image/brain (1).png" alt="hero" />
      </div>
    </section>

    <!-- COMPTEUR -->
    <div style="text-align: center; padding: 20px 0 0">
      <span
        id="compteur-alire"
        style="
          background: #9333ea;
          color: white;
          padding: 6px 20px;
          border-radius: 20px;
          font-size: 14px;
        "
      >
        0 livre(s) dans la liste
      </span>
    </div>

    <!-- GRILLE À LIRE -->
    <section class="alire-section">
      <div class="livres-grid" id="alire-page-container">
        <!-- Livres "À lire" injectés ici -->
      </div>
    </section>

    <!-- MODALE DÉTAILS -->
    <div class="modale-overlay" id="modale-overlay">
      <div class="modale">
        <button class="modale-close" id="modale-close">&times;</button>
        <div class="modale-content">
          <img id="modale-img" src="" alt="" />
          <div class="modale-info">
            <h3 id="modale-titre"></h3>
            <p id="modale-auteur"></p>
            <span id="modale-genre" class="genre-badge"></span>
            <p id="modale-description"></p>
            <button class="btn-modale-alire" id="btn-modale-alire">
              ♥ Retirer de ma liste
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 LireMonde - ReadSphere Startup</p>
    </footer>

    <script src="api.js"></script>
    <script src="alire.js"></script>
  </body>
</html>
